<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none" role="img" aria-label="Digital Forms System">
  <defs>
    <linearGradient id="f-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f20"/>
      <stop offset="0.55" stop-color="#0c1026"/>
      <stop offset="1" stop-color="#150b30"/>
    </linearGradient>
    <linearGradient id="f-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
    <radialGradient id="f-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="f-grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" stroke="#9fb0d0" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="800" height="450" fill="url(#f-bg)"/>
  <rect width="800" height="450" fill="url(#f-grid)"/>
  <ellipse cx="610" cy="110" rx="300" ry="230" fill="url(#f-glow)"/>

  <!-- window dots -->
  <g>
    <circle cx="42" cy="40" r="6" fill="#ff5f56"/>
    <circle cx="64" cy="40" r="6" fill="#ffbd2e"/>
    <circle cx="86" cy="40" r="6" fill="#27c93f"/>
  </g>

  <!-- form document (glass) -->
  <g>
    <rect x="92" y="96" width="300" height="288" rx="18" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.12"/>
    <rect x="92" y="96" width="300" height="40" rx="18" fill="url(#f-accent)" fill-opacity="0.18"/>
    <rect x="116" y="160" width="170" height="12" rx="6" fill="#ffffff" fill-opacity="0.22"/>
    <rect x="116" y="190" width="252" height="10" rx="5" fill="#ffffff" fill-opacity="0.12"/>
    <rect x="116" y="214" width="230" height="10" rx="5" fill="#ffffff" fill-opacity="0.12"/>
    <!-- check rows -->
    <rect x="116" y="250" width="22" height="22" rx="6" fill="none" stroke="url(#f-accent)" stroke-width="2.5"/>
    <path d="M121 261l5 5 9-10" stroke="#22d3ee" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="150" y="256" width="160" height="10" rx="5" fill="#ffffff" fill-opacity="0.16"/>
    <rect x="116" y="288" width="22" height="22" rx="6" fill="none" stroke="url(#f-accent)" stroke-width="2.5"/>
    <path d="M121 299l5 5 9-10" stroke="#22d3ee" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="150" y="294" width="120" height="10" rx="5" fill="#ffffff" fill-opacity="0.16"/>
    <rect x="116" y="338" width="120" height="30" rx="8" fill="url(#f-accent)" fill-opacity="0.85"/>
  </g>

  <!-- database stack -->
  <g transform="translate(470,150)" stroke="url(#f-accent)" stroke-width="3" fill="#22d3ee" fill-opacity="0.06">
    <ellipse cx="80" cy="20" rx="80" ry="24"/>
    <path d="M0 20v44c0 13 36 24 80 24s80-11 80-24V20" />
    <path d="M0 64v44c0 13 36 24 80 24s80-11 80-24V64"/>
  </g>

  <!-- bar chart -->
  <g transform="translate(470,300)">
    <rect x="0" y="40" width="26" height="50" rx="5" fill="url(#f-accent)" fill-opacity="0.55"/>
    <rect x="40" y="18" width="26" height="72" rx="5" fill="url(#f-accent)" fill-opacity="0.75"/>
    <rect x="80" y="0" width="26" height="90" rx="5" fill="url(#f-accent)"/>
    <rect x="120" y="28" width="26" height="62" rx="5" fill="url(#f-accent)" fill-opacity="0.65"/>
  </g>

  <!-- label -->
  <g font-family="'JetBrains Mono','Courier New',monospace">
    <rect x="42" y="400" width="200" height="30" rx="15" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.12"/>
    <circle cx="62" cy="415" r="5" fill="#34d399"/>
    <text x="78" y="420" fill="#cfe0f5" font-size="15">C# · SQL · Reports</text>
  </g>
</svg>
