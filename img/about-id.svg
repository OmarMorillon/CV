<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" fill="none" role="img" aria-label="Credencial de Omar Morillon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f20"/><stop offset="0.55" stop-color="#0c1026"/><stop offset="1" stop-color="#140b2c"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/><stop offset="0.5" stop-color="#8b5cf6"/><stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.4"/><stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fff" stop-opacity="0"/><stop offset="0.5" stop-color="#fff" stop-opacity="0.10"/><stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0H0V30" stroke="#9fb0d0" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
    <clipPath id="card"><rect x="40" y="54" width="520" height="492" rx="30"/></clipPath>
    <style>
      .dot{transform-box:fill-box;transform-origin:center;animation:pulse 2.4s ease-in-out infinite}
      .ring{transform-box:fill-box;transform-origin:center;animation:spin 9s linear infinite}
      .sheen{animation:sweep 6s ease-in-out infinite}
      @keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
      @keyframes spin{to{transform:rotate(360deg)}}
      @keyframes sweep{0%,12%{transform:translateX(0)}55%{transform:translateX(520px)}100%{transform:translateX(520px)}}
      @media (prefers-reduced-motion:reduce){*{animation:none!important}.sheen{display:none}}
    </style>
  </defs>

  <rect width="600" height="600" fill="url(#bg)"/>
  <rect width="600" height="600" fill="url(#grid)"/>
  <ellipse cx="300" cy="240" rx="260" ry="220" fill="url(#glow)"/>

  <!-- glass card -->
  <rect x="40" y="54" width="520" height="492" rx="30" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.12"/>
  <rect x="40" y="54" width="520" height="3" rx="1.5" fill="#ffffff" fill-opacity="0.18"/>
  <g clip-path="url(#card)"><g transform="rotate(16 300 300)"><rect class="sheen" x="-60" y="20" width="60" height="560" fill="url(#sheen)"/></g></g>

  <!-- header -->
  <text x="72" y="100" font-family="'JetBrains Mono',monospace" font-size="16" fill="#22d3ee">&lt;OM/&gt;</text>
  <rect x="430" y="84" width="98" height="26" rx="13" fill="#34d399" fill-opacity="0.12" stroke="#34d399" stroke-opacity="0.4"/>
  <circle class="dot" cx="447" cy="97" r="4.5" fill="#34d399"/>
  <text x="458" y="101" font-family="'JetBrains Mono',monospace" font-size="11" fill="#34d399">disponible</text>
  <line x1="72" y1="122" x2="528" y2="122" stroke="#ffffff" stroke-opacity="0.08"/>

  <!-- avatar monogram -->
  <circle cx="300" cy="196" r="50" fill="none" stroke="url(#acc)" stroke-width="2" stroke-dasharray="6 7" class="ring"/>
  <circle cx="300" cy="196" r="42" fill="url(#acc)"/>
  <ellipse cx="300" cy="180" rx="26" ry="11" fill="#ffffff" opacity="0.18"/>
  <text x="300" y="207" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="30" font-weight="700" fill="#ffffff">OM</text>

  <!-- name + role + location -->
  <text x="300" y="286" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="32" font-weight="700" fill="#eaf1fb">Omar Morillon</text>
  <text x="300" y="314" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="15" fill="#22d3ee">Data &#183; BI &#183; Full-Stack Developer</text>
  <g>
    <path d="M196 338 c0 -7 -6 -12 -6 -18 a6 6 0 0 1 12 0 c0 6 -6 11 -6 18 z" fill="none" stroke="#8fa3c4" stroke-width="1.6"/>
    <circle cx="190" cy="320" r="2" fill="#8fa3c4"/>
    <text x="210" y="343" font-family="'Inter',sans-serif" font-size="14" fill="#8fa3c4">San Pedro de las Colonias &#183; MX</text>
  </g>

  <line x1="72" y1="370" x2="528" y2="370" stroke="#ffffff" stroke-opacity="0.08"/>

  <!-- stack chips -->
  <text x="300" y="396" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="12" fill="#6f82a3">// stack</text>
  <g font-family="'JetBrains Mono',monospace" font-size="13" fill="#cfe0f5">
    <g>
      <rect x="158" y="410" width="100" height="30" rx="9" fill="#ffffff" fill-opacity="0.05" stroke="#22d3ee" stroke-opacity="0.3"/>
      <text x="208" y="430" text-anchor="middle">SQL Server</text>
      <rect x="270" y="410" width="74" height="30" rx="9" fill="#ffffff" fill-opacity="0.05" stroke="#22d3ee" stroke-opacity="0.3"/>
      <text x="307" y="430" text-anchor="middle">Python</text>
      <rect x="356" y="410" width="86" height="30" rx="9" fill="#ffffff" fill-opacity="0.05" stroke="#22d3ee" stroke-opacity="0.3"/>
      <text x="399" y="430" text-anchor="middle">Power BI</text>
    </g>
    <g>
      <rect x="176" y="448" width="78" height="30" rx="9" fill="#ffffff" fill-opacity="0.05" stroke="#8b5cf6" stroke-opacity="0.35"/>
      <text x="215" y="468" text-anchor="middle">Node.js</text>
      <rect x="266" y="448" width="94" height="30" rx="9" fill="#ffffff" fill-opacity="0.05" stroke="#8b5cf6" stroke-opacity="0.35"/>
      <text x="313" y="468" text-anchor="middle">REST APIs</text>
      <rect x="372" y="448" width="54" height="30" rx="9" fill="#ffffff" fill-opacity="0.05" stroke="#8b5cf6" stroke-opacity="0.35"/>
      <text x="399" y="468" text-anchor="middle">ETL</text>
    </g>
  </g>

  <!-- footer: barcode + id -->
  <g transform="translate(32,0)" fill="#ffffff" fill-opacity="0.55">
    <rect x="220" y="500" width="2" height="24"/><rect x="225" y="500" width="4" height="24"/><rect x="232" y="500" width="2" height="24"/>
    <rect x="237" y="500" width="6" height="24"/><rect x="246" y="500" width="2" height="24"/><rect x="251" y="500" width="2" height="24"/>
    <rect x="256" y="500" width="4" height="24"/><rect x="263" y="500" width="2" height="24"/><rect x="268" y="500" width="6" height="24"/>
    <rect x="277" y="500" width="2" height="24"/><rect x="282" y="500" width="4" height="24"/><rect x="289" y="500" width="2" height="24"/>
    <rect x="294" y="500" width="2" height="24"/><rect x="299" y="500" width="6" height="24"/><rect x="308" y="500" width="2" height="24"/>
    <rect x="313" y="500" width="4" height="24"/>
  </g>
  <text x="300" y="540" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="10" fill="#6f82a3" letter-spacing="2">OMAR MORILLON &#183; DATA &amp; BI</text>
</svg>
