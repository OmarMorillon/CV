<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" fill="none" role="img" aria-label="Dashboard de datos y BI">
  <defs>
    <linearGradient id="a-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f20"/>
      <stop offset="0.55" stop-color="#0c1026"/>
      <stop offset="1" stop-color="#160b30"/>
    </linearGradient>
    <linearGradient id="a-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="a-area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="a-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="a-grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0H0V30" stroke="#9fb0d0" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="600" height="600" fill="url(#a-bg)"/>
  <rect width="600" height="600" fill="url(#a-grid)"/>
  <ellipse cx="480" cy="90" rx="240" ry="200" fill="url(#a-glow)"/>

  <!-- floating data nodes -->
  <g stroke="url(#a-accent)" stroke-opacity="0.5" stroke-width="1.5">
    <line x1="40" y1="40" x2="92" y2="28"/>
    <line x1="92" y1="28" x2="120" y2="64"/>
    <line x1="520" y1="560" x2="560" y2="520"/>
  </g>
  <g fill="#22d3ee">
    <circle cx="40" cy="40" r="3.5"/><circle cx="92" cy="28" r="3.5" fill="#8b5cf6"/>
    <circle cx="120" cy="64" r="3.5" fill="#f472b6"/>
    <circle cx="520" cy="560" r="3.5"/><circle cx="560" cy="520" r="3.5" fill="#f472b6"/>
  </g>

  <!-- dashboard glass panel -->
  <rect x="40" y="72" width="520" height="468" rx="24" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.12"/>
  <rect x="40" y="72" width="520" height="2" rx="1" fill="#ffffff" fill-opacity="0.18"/>

  <!-- panel header -->
  <g>
    <circle cx="68" cy="102" r="5" fill="#ff5f56"/>
    <circle cx="86" cy="102" r="5" fill="#ffbd2e"/>
    <circle cx="104" cy="102" r="5" fill="#27c93f"/>
    <text x="124" y="107" font-family="'JetBrains Mono',monospace" font-size="15" fill="#8fa3c4">omar.bi // dashboard</text>
    <rect x="468" y="90" width="66" height="24" rx="12" fill="#34d399" fill-opacity="0.12" stroke="#34d399" stroke-opacity="0.4"/>
    <circle cx="484" cy="102" r="4" fill="#34d399"/>
    <text x="496" y="107" font-family="'JetBrains Mono',monospace" font-size="12" fill="#34d399">live</text>
  </g>

  <!-- KPI cards -->
  <g font-family="'Space Grotesk','Segoe UI',sans-serif">
    <g>
      <rect x="64" y="132" width="150" height="74" rx="14" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.10"/>
      <text x="80" y="174" font-size="30" font-weight="700" fill="url(#a-accent)">12+</text>
      <text x="80" y="194" font-family="'JetBrains Mono',monospace" font-size="12" fill="#8fa3c4">tecnologías</text>
    </g>
    <g>
      <rect x="225" y="132" width="150" height="74" rx="14" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.10"/>
      <text x="241" y="174" font-size="30" font-weight="700" fill="url(#a-accent)">3+</text>
      <text x="241" y="194" font-family="'JetBrains Mono',monospace" font-size="12" fill="#8fa3c4">proyectos</text>
    </g>
    <g>
      <rect x="386" y="132" width="150" height="74" rx="14" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.10"/>
      <text x="402" y="174" font-size="30" font-weight="700" fill="url(#a-accent)">2</text>
      <text x="402" y="194" font-family="'JetBrains Mono',monospace" font-size="12" fill="#8fa3c4">empresas</text>
    </g>
  </g>

  <!-- line / area chart -->
  <g>
    <text x="64" y="240" font-family="'JetBrains Mono',monospace" font-size="12" fill="#6f82a3">trend · ETL throughput</text>
    <line x1="64" y1="350" x2="536" y2="350" stroke="#ffffff" stroke-opacity="0.08"/>
    <path d="M64 326 L123 296 L182 308 L241 256 L300 280 L359 240 L418 262 L477 222 L536 246 L536 350 L64 350 Z" fill="url(#a-area)"/>
    <path d="M64 326 L123 296 L182 308 L241 256 L300 280 L359 240 L418 262 L477 222 L536 246" stroke="url(#a-accent)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="477" cy="222" r="5" fill="#f472b6"/>
    <circle cx="477" cy="222" r="10" fill="#f472b6" fill-opacity="0.25"/>
  </g>

  <!-- bar chart -->
  <g>
    <text x="64" y="392" font-family="'JetBrains Mono',monospace" font-size="12" fill="#6f82a3">queries / week</text>
    <g>
      <rect x="64"  y="470" width="28" height="45" rx="5" fill="url(#a-accent)" fill-opacity="0.5"/>
      <rect x="108" y="448" width="28" height="67" rx="5" fill="url(#a-accent)" fill-opacity="0.65"/>
      <rect x="152" y="458" width="28" height="57" rx="5" fill="url(#a-accent)" fill-opacity="0.55"/>
      <rect x="196" y="430" width="28" height="85" rx="5" fill="url(#a-accent)"/>
      <rect x="240" y="452" width="28" height="63" rx="5" fill="url(#a-accent)" fill-opacity="0.7"/>
    </g>
  </g>

  <!-- donut gauge -->
  <g transform="translate(455,452)">
    <text x="0" y="-78" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="12" fill="#6f82a3">automation</text>
    <circle r="56" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="14"/>
    <circle r="56" fill="none" stroke="url(#a-accent)" stroke-width="14" stroke-linecap="round"
            stroke-dasharray="351.8" stroke-dashoffset="77.4" transform="rotate(-90)"/>
    <text x="0" y="2" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="26" font-weight="700" fill="#e6edf7">78%</text>
    <text x="0" y="22" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="11" fill="#8fa3c4">RPA · ETL</text>
  </g>
</svg>
