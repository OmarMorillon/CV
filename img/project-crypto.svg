<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none" role="img" aria-label="Cryptocurrency Quoter">
  <defs>
    <linearGradient id="c-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f20"/>
      <stop offset="0.55" stop-color="#0c1026"/>
      <stop offset="1" stop-color="#0a182a"/>
    </linearGradient>
    <linearGradient id="c-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="c-area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="c-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <pattern id="c-grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" stroke="#9fb0d0" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="800" height="450" fill="url(#c-bg)"/>
  <rect width="800" height="450" fill="url(#c-grid)"/>
  <ellipse cx="200" cy="130" rx="300" ry="230" fill="url(#c-glow)"/>

  <g>
    <circle cx="42" cy="40" r="6" fill="#ff5f56"/>
    <circle cx="64" cy="40" r="6" fill="#ffbd2e"/>
    <circle cx="86" cy="40" r="6" fill="#27c93f"/>
  </g>

  <!-- price area + line -->
  <path d="M70 330 L160 270 L250 300 L340 210 L430 250 L520 150 L610 190 L700 110 V360 H70 Z" fill="url(#c-area)"/>
  <path d="M70 330 L160 270 L250 300 L340 210 L430 250 L520 150 L610 190 L700 110" stroke="url(#c-accent)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="700" cy="110" r="7" fill="#f472b6"/>
  <circle cx="700" cy="110" r="13" fill="#f472b6" fill-opacity="0.25"/>

  <!-- candlesticks -->
  <g stroke-width="3">
    <g stroke="#34d399"><line x1="150" y1="360" x2="150" y2="408"/><rect x="142" y="372" width="16" height="26" rx="2" fill="#34d399"/></g>
    <g stroke="#f472b6"><line x1="250" y1="356" x2="250" y2="410"/><rect x="242" y="368" width="16" height="30" rx="2" fill="#f472b6"/></g>
    <g stroke="#34d399"><line x1="350" y1="350" x2="350" y2="406"/><rect x="342" y="362" width="16" height="34" rx="2" fill="#34d399"/></g>
    <g stroke="#34d399"><line x1="450" y1="354" x2="450" y2="408"/><rect x="442" y="366" width="16" height="28" rx="2" fill="#34d399"/></g>
    <g stroke="#f472b6"><line x1="550" y1="358" x2="550" y2="410"/><rect x="542" y="370" width="16" height="26" rx="2" fill="#f472b6"/></g>
  </g>

  <!-- coin -->
  <g transform="translate(610,70)">
    <circle r="46" fill="url(#c-accent)" fill-opacity="0.16" stroke="url(#c-accent)" stroke-width="3"/>
    <text x="0" y="16" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="48" font-weight="700" fill="#22d3ee">&#8383;</text>
  </g>

  <!-- label -->
  <g font-family="'JetBrains Mono','Courier New',monospace">
    <rect x="42" y="400" width="230" height="30" rx="15" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.12"/>
    <circle cx="62" cy="415" r="5" fill="#34d399"/>
    <text x="78" y="420" fill="#cfe0f5" font-size="15">JS · API · Realtime</text>
  </g>
</svg>
