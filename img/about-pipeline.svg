<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" fill="none" role="img" aria-label="Pipeline de datos: fuentes, ETL y BI">
  <defs>
    <linearGradient id="p-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f20"/>
      <stop offset="0.55" stop-color="#0c1026"/>
      <stop offset="1" stop-color="#160b30"/>
    </linearGradient>
    <linearGradient id="p-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="p-area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="p-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="p-core" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0.05"/>
    </radialGradient>
    <pattern id="p-grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0H0V30" stroke="#9fb0d0" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="600" height="600" fill="url(#p-bg)"/>
  <rect width="600" height="600" fill="url(#p-grid)"/>
  <ellipse cx="300" cy="300" rx="240" ry="240" fill="url(#p-glow)"/>

  <!-- header -->
  <text x="40" y="56" font-family="'JetBrains Mono',monospace" font-size="16" fill="#22d3ee">// data pipeline</text>
  <text x="40" y="80" font-family="'JetBrains Mono',monospace" font-size="12" fill="#6f82a3">sources &#8594; ETL &#8594; BI</text>

  <!-- converging connectors -->
  <g stroke="url(#p-accent)" stroke-width="2" fill="none" opacity="0.7">
    <path d="M96 143 C 150 240, 205 236, 262 252"/>
    <path d="M232 123 C 252 190, 270 205, 288 236"/>
    <path d="M368 123 C 348 190, 330 205, 312 236"/>
    <path d="M504 143 C 450 240, 395 236, 338 252"/>
  </g>

  <!-- source chips -->
  <g font-family="'JetBrains Mono',monospace" font-size="14">
    <g>
      <rect x="53" y="105" width="86" height="38" rx="12" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.12"/>
      <circle cx="71" cy="124" r="4" fill="#22d3ee"/>
      <text x="84" y="129" fill="#cfe0f5">SQL</text>
    </g>
    <g>
      <rect x="189" y="85" width="86" height="38" rx="12" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.12"/>
      <circle cx="207" cy="104" r="4" fill="#8b5cf6"/>
      <text x="220" y="109" fill="#cfe0f5">API</text>
    </g>
    <g>
      <rect x="325" y="85" width="86" height="38" rx="12" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.12"/>
      <circle cx="343" cy="104" r="4" fill="#34d399"/>
      <text x="356" y="109" fill="#cfe0f5">XLSX</text>
    </g>
    <g>
      <rect x="461" y="105" width="86" height="38" rx="12" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.12"/>
      <circle cx="479" cy="124" r="4" fill="#f472b6"/>
      <text x="492" y="129" fill="#cfe0f5">XML</text>
    </g>
  </g>

  <!-- ETL core (hexagon) -->
  <g>
    <polygon points="228,300 264,238 336,238 372,300 336,362 264,362" fill="url(#p-core)" stroke="url(#p-accent)" stroke-width="2.5"/>
    <circle cx="300" cy="300" r="34" fill="none" stroke="#ffffff" stroke-opacity="0.14" stroke-width="1.5" stroke-dasharray="5 6"/>
    <circle cx="300" cy="300" r="6" fill="#22d3ee"/>
    <circle cx="300" cy="266" r="3.5" fill="#8b5cf6"/>
    <circle cx="329" cy="317" r="3.5" fill="#f472b6"/>
    <circle cx="271" cy="317" r="3.5" fill="#34d399"/>
    <line x1="300" y1="300" x2="300" y2="266" stroke="#8b5cf6" stroke-opacity="0.5"/>
    <line x1="300" y1="300" x2="329" y2="317" stroke="#f472b6" stroke-opacity="0.5"/>
    <line x1="300" y1="300" x2="271" y2="317" stroke="#34d399" stroke-opacity="0.5"/>
    <text x="300" y="408" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="20" font-weight="700" fill="#e6edf7">ETL</text>
    <text x="300" y="428" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="11" fill="#8fa3c4">normalize &#183; automate</text>
  </g>

  <!-- flow down -->
  <path d="M300 362 L300 448" stroke="url(#p-accent)" stroke-width="2" stroke-dasharray="4 5"/>
  <path d="M292 442 L300 452 L308 442" stroke="#f472b6" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- BI output panel -->
  <g>
    <rect x="150" y="456" width="300" height="104" rx="16" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="170" y="484" font-family="'JetBrains Mono',monospace" font-size="12" fill="#6f82a3">&#8594; Business Intelligence</text>
    <!-- mini chart -->
    <path d="M170 540 L200 522 L228 530 L256 506 L284 516 L312 498 L312 548 L170 548 Z" fill="url(#p-area)"/>
    <path d="M170 540 L200 522 L228 530 L256 506 L284 516 L312 498" stroke="url(#p-accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- check badge -->
    <circle cx="396" cy="520" r="22" fill="#34d399" fill-opacity="0.14" stroke="#34d399" stroke-opacity="0.5"/>
    <path d="M386 520 l7 7 12 -14" stroke="#34d399" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- floating nodes -->
  <g>
    <circle cx="44" cy="300" r="3" fill="#22d3ee" opacity="0.7"/>
    <circle cx="556" cy="320" r="3" fill="#f472b6" opacity="0.7"/>
    <circle cx="520" cy="200" r="2.5" fill="#8b5cf6" opacity="0.6"/>
    <circle cx="78" cy="210" r="2.5" fill="#34d399" opacity="0.6"/>
  </g>

  <!-- monogram -->
  <text x="540" y="560" text-anchor="end" font-family="'JetBrains Mono',monospace" font-size="14" fill="#22d3ee" opacity="0.6">&lt;OM/&gt;</text>
</svg>
