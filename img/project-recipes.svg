<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none" role="img" aria-label="Recipe Finder">
  <defs>
    <linearGradient id="r-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f20"/>
      <stop offset="0.55" stop-color="#0c1026"/>
      <stop offset="1" stop-color="#1a0b26"/>
    </linearGradient>
    <linearGradient id="r-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
    <radialGradient id="r-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f472b6" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#f472b6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="r-grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" stroke="#9fb0d0" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="800" height="450" fill="url(#r-bg)"/>
  <rect width="800" height="450" fill="url(#r-grid)"/>
  <ellipse cx="600" cy="320" rx="300" ry="230" fill="url(#r-glow)"/>

  <g>
    <circle cx="42" cy="40" r="6" fill="#ff5f56"/>
    <circle cx="64" cy="40" r="6" fill="#ffbd2e"/>
    <circle cx="86" cy="40" r="6" fill="#27c93f"/>
  </g>

  <!-- search bar -->
  <g>
    <rect x="92" y="88" width="500" height="52" rx="26" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.14"/>
    <circle cx="126" cy="114" r="12" fill="none" stroke="url(#r-accent)" stroke-width="3"/>
    <line x1="135" y1="123" x2="146" y2="134" stroke="url(#r-accent)" stroke-width="3" stroke-linecap="round"/>
    <rect x="162" y="108" width="180" height="12" rx="6" fill="#ffffff" fill-opacity="0.2"/>
    <rect x="612" y="88" width="96" height="52" rx="14" fill="url(#r-accent)" fill-opacity="0.85"/>
  </g>

  <!-- recipe result cards -->
  <g>
    <g>
      <rect x="92" y="178" width="190" height="210" rx="16" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.12"/>
      <rect x="92" y="178" width="190" height="110" rx="16" fill="url(#r-accent)" fill-opacity="0.22"/>
      <circle cx="187" cy="233" r="30" fill="none" stroke="#22d3ee" stroke-width="3"/>
      <path d="M187 213v40M173 219c0 12 28 12 28 0" stroke="#22d3ee" stroke-width="3" stroke-linecap="round"/>
      <rect x="112" y="306" width="120" height="11" rx="5" fill="#ffffff" fill-opacity="0.22"/>
      <rect x="112" y="328" width="150" height="9" rx="4" fill="#ffffff" fill-opacity="0.12"/>
      <rect x="112" y="346" width="90" height="9" rx="4" fill="#ffffff" fill-opacity="0.12"/>
    </g>
    <g>
      <rect x="305" y="178" width="190" height="210" rx="16" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.12"/>
      <rect x="305" y="178" width="190" height="110" rx="16" fill="url(#r-accent)" fill-opacity="0.3"/>
      <path d="M400 210c-16 0-26 12-26 26 0 18 26 38 26 38s26-20 26-38c0-14-10-26-26-26z" fill="none" stroke="#f472b6" stroke-width="3"/>
      <rect x="325" y="306" width="120" height="11" rx="5" fill="#ffffff" fill-opacity="0.22"/>
      <rect x="325" y="328" width="150" height="9" rx="4" fill="#ffffff" fill-opacity="0.12"/>
      <rect x="325" y="346" width="90" height="9" rx="4" fill="#ffffff" fill-opacity="0.12"/>
    </g>
    <g>
      <rect x="518" y="178" width="190" height="210" rx="16" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.12"/>
      <rect x="518" y="178" width="190" height="110" rx="16" fill="url(#r-accent)" fill-opacity="0.18"/>
      <g transform="translate(613,233)" stroke="#8b5cf6" stroke-width="3" stroke-linecap="round" fill="none">
        <path d="M-14-22v44M-14-22c-8 0-8 18 0 18M-6-22v18"/>
        <path d="M14-22v44M14-22c8 2 8 22 0 22"/>
      </g>
      <rect x="538" y="306" width="120" height="11" rx="5" fill="#ffffff" fill-opacity="0.22"/>
      <rect x="538" y="328" width="150" height="9" rx="4" fill="#ffffff" fill-opacity="0.12"/>
      <rect x="538" y="346" width="90" height="9" rx="4" fill="#ffffff" fill-opacity="0.12"/>
    </g>
  </g>

  <!-- label -->
  <g font-family="'JetBrains Mono','Courier New',monospace">
    <rect x="42" y="405" width="210" height="30" rx="15" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.12"/>
    <circle cx="62" cy="420" r="5" fill="#34d399"/>
    <text x="78" y="425" fill="#cfe0f5" font-size="15">JS · API · Search</text>
  </g>
</svg>
