<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" fill="none" role="img" aria-label="Recipe Finder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#120a20"/><stop offset="1" stop-color="#1a0b22"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/><stop offset="0.55" stop-color="#d946ef"/><stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f472b6" stop-opacity="0.42"/><stop offset="1" stop-color="#f472b6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fff" stop-opacity="0"/><stop offset="0.5" stop-color="#fff" stop-opacity="0.4"/><stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="20"/></filter>
    <clipPath id="clip"><rect x="325" y="135" width="150" height="150" rx="36"/></clipPath>
    <style>
      .floaty{animation:float 5s ease-in-out infinite .3s}
      .bgglow{animation:pulse 5s ease-in-out infinite}
      .sheen{animation:sheen 5.5s ease-in-out infinite .6s}
      .glyph{transform-box:fill-box;transform-origin:center;animation:bob 5s ease-in-out infinite .3s}
      @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
      @keyframes pulse{0%,100%{opacity:.75}50%{opacity:1}}
      @keyframes sheen{0%,14%{transform:translateX(0)}52%{transform:translateX(320px)}100%{transform:translateX(320px)}}
      @keyframes bob{0%,100%{transform:rotate(0)}50%{transform:rotate(-5deg)}}
      @media (prefers-reduced-motion:reduce){*{animation:none!important}.sheen{display:none}}
    </style>
  </defs>

  <rect width="800" height="420" fill="url(#bg)"/>
  <ellipse class="bgglow" cx="400" cy="200" rx="300" ry="220" fill="url(#glow)"/>
  <rect x="327" y="152" width="150" height="150" rx="36" fill="#000" opacity="0.35" filter="url(#soft)"/>

  <g class="floaty">
    <rect x="315" y="125" width="170" height="170" rx="42" fill="url(#tile)" opacity="0.30" filter="url(#soft)"/>
    <rect x="325" y="135" width="150" height="150" rx="36" fill="url(#tile)"/>
    <ellipse cx="400" cy="160" rx="62" ry="26" fill="#ffffff" opacity="0.14"/>
    <g clip-path="url(#clip)"><g transform="rotate(18 400 210)"><rect class="sheen" x="150" y="100" width="34" height="230" fill="url(#sheen)"/></g></g>
    <rect x="325" y="135" width="150" height="150" rx="36" fill="none" stroke="#ffffff" stroke-opacity="0.25"/>
    <g class="glyph" stroke="#ffffff" stroke-width="5.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M378 176 V196"/><path d="M388 176 V196"/><path d="M398 176 V196"/><path d="M388 196 V246"/>
      <path d="M420 176 C 431 188 431 206 420 212 L420 246"/>
    </g>
  </g>
</svg>
