<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" fill="none" role="img" aria-label="Recipe Finder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#120a20"/><stop offset="1" stop-color="#1a0b22"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/><stop offset="0.55" stop-color="#d946ef"/><stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f472b6" stop-opacity="0.42"/><stop offset="1" stop-color="#f472b6" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="20"/></filter>
  </defs>

  <rect width="800" height="420" fill="url(#bg)"/>
  <ellipse cx="400" cy="200" rx="300" ry="220" fill="url(#glow)"/>

  <rect x="327" y="152" width="150" height="150" rx="36" fill="#000" opacity="0.35" filter="url(#soft)"/>
  <rect x="315" y="125" width="170" height="170" rx="42" fill="url(#tile)" opacity="0.30" filter="url(#soft)"/>

  <rect x="325" y="135" width="150" height="150" rx="36" fill="url(#tile)"/>
  <ellipse cx="400" cy="160" rx="62" ry="26" fill="#ffffff" opacity="0.14"/>
  <rect x="325" y="135" width="150" height="150" rx="36" fill="none" stroke="#ffffff" stroke-opacity="0.25"/>

  <!-- glyph: fork + knife (cutlery) -->
  <g stroke="#ffffff" stroke-width="5.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- fork -->
    <path d="M378 176 V196"/>
    <path d="M388 176 V196"/>
    <path d="M398 176 V196"/>
    <path d="M388 196 V246"/>
    <!-- knife -->
    <path d="M420 176 C 431 188 431 206 420 212 L420 246"/>
  </g>
</svg>
